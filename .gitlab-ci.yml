variables:
  RUFF_CACHE_DIR: "tmp/ruff_cache"
  MYPY_CACHE_DIR: "tmp/mypy_cache"
  PYTEST_ADDOPTS: "--cache-clear"

default:
  before_script:
    - python --version
    - pip install -r requirements-dev.txt

stages:
  - format
  - lint
  - type_check
  - test
  - coverage

format:
  stage: format
  script:
    - python -m ruff format --check .

lint:
  stage: lint
  script:
    - python -m ruff check .

type_check:
  stage: type_check
  script:
    - python -m mypy backend --ignore-missing-imports --cache-dir=tmp/mypy_cache

test:
  stage: test
  script:
    - python -m pytest tests --cache-clear

coverage:
  stage: coverage
  script:
    - python -m pytest tests --cov=. --cov-report=xml --cov-report=term-missing
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml