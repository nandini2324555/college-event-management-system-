stages:
  - format
  - lint
  - type_check
  - test
  - coverage

format:
  stage: format
  script:
    - pip install -r requirements-dev.txt
    - python -m ruff format --check .

lint:
  stage: lint
  script:
    - pip install -r requirements-dev.txt
    - python -m ruff check .

type_check:
  stage: type_check
  script:
    - pip install -r requirements-dev.txt
    - mypy .

test:
  stage: test
  script:
    - pip install -r requirements-dev.txt
    - pytest tests

coverage:
  stage: coverage
  script:
    - pip install -r requirements-dev.txt
    - pytest tests --cov=. --cov-report=xml --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml