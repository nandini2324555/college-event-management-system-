stages:
  - format
  - lint
  - type_check
  - test
  - coverage

format:
  stage: format
  script:
    - pip install -r requirements-dev.txt
    - ruff format --check .

lint:
  stage: lint
  script:
    - pip install -r requirements-dev.txt
    - ruff check .

type_check:
  stage: type_check
  script:
    - pip install -r requirements-dev.txt
    - mypy .

test:
  stage: test
  script:
    - pip install -r requirements-dev.txt
    - pytest tests

coverage:
  stage: coverage
  script:
    - pip install -r requirements-dev.txt
    - pytest tests --cov=. --cov-report=xml --cov-report=term
  artifacts:
    paths:
      - coverage.xml